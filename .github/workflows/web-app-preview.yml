name: web-app — Preview Deploy (v3-revamp)

# Branch deployments to Cloudflare Pages for v3 work-in-progress.
# Production stays untouched — main pushes still go through web-app-production.yml.
# Result URL: https://v3-revamp.investment-report-app.pages.dev/
on:
  push:
    branches: [v3-revamp]
    paths:
      - "web-app/**"
      - "data/quotes/**"
  workflow_dispatch:

jobs:
  build-and-preview:
    name: Build & Deploy preview to Cloudflare Pages
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Next.js static export
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy preview to Cloudflare Pages
        run: npx wrangler pages deploy out --project-name investment-report-app --branch ${{ github.ref_name }} --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
