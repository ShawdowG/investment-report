name: Web Next Production Deploy

on:
  push:
    branches: [ main ]
    paths:
      - 'web-next/**'
      - 'data/**'
      - 'reports/**'
      - 'scripts/**'
      - '.github/workflows/web-next-production.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install web-next deps
        run: npm install
        working-directory: web-next
      - name: Build Astro production site
        run: npm run build
        working-directory: web-next
      - name: Verify post-cutover parity/health
        run: node scripts/post-cutover-verify.js
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web-next/dist
      - id: deployment
        uses: actions/deploy-pages@v4
