name: Daily Quotes — Refresh data/quotes/ and deploy

# Replaces the old daily-report.yml (which generated Alpha/Beta/Gamma
# reports). v4 cockpit only needs daily OHLCV refresh per ADR-001.

on:
  schedule:
    - cron: "30 22 * * 1-5"   # 22:30 UTC weekdays — after US close
  workflow_dispatch:

jobs:
  refresh-and-deploy:
    name: Fetch quotes, commit, deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write   # bot pushes refreshed JSON back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install yfinance --quiet

      - name: Fetch daily quotes
        run: python scripts/fetch-quotes.py

      - name: Commit refreshed quotes
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add data/quotes/ data/company/
          git diff --cached --quiet \
            && echo "No quote or company changes to commit." \
            || git commit -m "auto: daily quotes + company $(date -u +%Y-%m-%d)"
          git push

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web-app/package-lock.json

      - name: Install web-app dependencies
        run: npm ci
        working-directory: web-app

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: web-app

      - name: Next.js static export
        run: npm run build
        working-directory: web-app
        env:
          NODE_ENV: production

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy out --project-name investment-report-app --commit-dirty=true
        working-directory: web-app
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
