name: Validate and Build Index

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate reports
        run: node scripts/validate-reports.js
      - name: Build index
        run: node scripts/build-index.js
